{% extends "base.html" %}

{% block title %}{{ post.title }} · {{ site_settings.site_name|default:"AfriEthics" }}{% endblock %}

{% block content %}
  <a class="btn btn-sm btn-outline-secondary mb-3" href="/blog/">← Back to blog</a>
  <h1 class="h3">{{ post.title }}</h1>
  <div class="small text-muted">{{ post.published_at|date:"M j, Y" }}</div>

  {% if post.cover_image %}
    <img class="img-fluid rounded my-3" src="{{ post.cover_image.url }}" alt="" />
  {% endif %}

  <div class="mt-3">{{ post.content|safe }}</div>
{% endblock %}
